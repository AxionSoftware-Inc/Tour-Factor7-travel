version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    volumes:
      - ./Backend:/app
      - backend_media:/app/media
    env_file:
      - ./Backend/.env
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:8000 project.wsgi:application"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://127.0.0.1:8000/api}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000/api}
    command: npm run start -- --host 0.0.0.0 --port 3000

volumes:
  backend_media:
